name: Code Quality Checks

# Run checks when code is pushed or a pull request is created
on:
  push:
  pull_request:

jobs:
  quality-checks:
    name: Prettier ESLint Tests and Build
    runs-on: ubuntu-latest

    steps:
      # Download the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Node.js version 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies for the existing CRA project
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      # Check the code format
      - name: Run Prettier check
        run: npm run format:check

      # Check JavaScript and TypeScript code
      - name: Run ESLint
        run: npm run lint

      # Run all tests
      - name: Run tests
        run: npm run test:ci

      # Make sure the production build works
      - name: Create production build
        run: npm run build
        env:
          CI: false
